<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BUET Endless Chase Game</title>

<style>
    body {
        margin: 0;
        overflow: hidden;
        background: linear-gradient(#87CEEB, #ffffff);
        font-family: Arial;
    }

    #game {
        position: relative;
        width: 100vw;
        height: 100vh;
        background: url("https://images.unsplash.com/photo-1523580846011-d3a5bc25702b") center/cover;
        overflow: hidden;
    }

    /* road */
    .road {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 120px;
        background: #2c2c2c;
    }

    /* girl */
    #girl {
        position: absolute;
        width: 50px;
        height: 50px;
        background: hotpink;
        border-radius: 50%;
        bottom: 120px;
        left: 45%;
        text-align: center;
        line-height: 50px;
        font-size: 12px;
    }

    /* boy */
    #boy {
        position: absolute;
        width: 50px;
        height: 50px;
        background: black;
        color: white;
        border-radius: 50%;
        bottom: 120px;
        left: 45%;
        text-align: center;
        line-height: 50px;
        font-size: 12px;
    }

    #gameOver {
        position: absolute;
        top: 40%;
        width: 100%;
        text-align: center;
        font-size: 50px;
        color: red;
        display: none;
    }

    #text {
        position: absolute;
        top: 10px;
        width: 100%;
        text-align: center;
        color: white;
        font-size: 18px;
        text-shadow: 2px 2px 4px black;
    }
</style>
</head>

<body>

<div id="game">
    <div id="text">
        Boy: "Stop BUETian!" | Girl: "Get your chance if you can!"
    </div>

    <div id="girl">👩‍🧕</div>
    <div id="boy">🧑‍🦱</div>

    <div class="road"></div>

    <div id="gameOver">GAME OVER</div>
</div>

<script>
const girl = document.getElementById("girl");
const boy = document.getElementById("boy");
const gameOverText = document.getElementById("gameOver");

let lanes = [30, 45, 60]; // percentage positions
let laneIndex = 1;

let girlY = 0;
let velocity = 0;
let gravity = 1.2;
let isJumping = false;

let boySpeed = 2;
let boyX = -200;

function moveGirl() {
    girl.style.left = lanes[laneIndex] + "%";
}

document.addEventListener("keydown", (e) => {

    if (e.key === "ArrowLeft" && laneIndex > 0) {
        laneIndex--;
        moveGirl();
    }

    if (e.key === "ArrowRight" && laneIndex < lanes.length - 1) {
        laneIndex++;
        moveGirl();
    }

    if (e.code === "Space") {
        if (!isJumping) {
            velocity = -18;
            isJumping = true;
        }
    }
});

function update() {

    // jump physics
    girlY += velocity;
    velocity += gravity;

    if (girlY >= 0) {
        girlY = 0;
        isJumping = false;
    }

    girl.style.bottom = (120 + girlY) + "px";

    // boy chase
    boyX += boySpeed;
    boy.style.left = boyX + "px";
    boy.style.bottom = (120 + girlY) + "px";

    // reset loop
    if (boyX > window.innerWidth + 100) {
        boyX = -200;
    }

    // collision
    let g = girl.getBoundingClientRect();
    let b = boy.getBoundingClientRect();

    if (
        g.left < b.right &&
        g.right > b.left &&
        g.top < b.bottom &&
        g.bottom > b.top
    ) {
        gameOverText.style.display = "block";
        boySpeed = 0;
    }

    requestAnimationFrame(update);
}

moveGirl();
update();
</script>

</body>
</html>
